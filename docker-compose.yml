services:
  postgres:
    image: postgres:16-alpine
    container_name: authskip-postgres
    environment:
      POSTGRES_DB: authskip
      POSTGRES_USER: authskip
      POSTGRES_PASSWORD: authskip
    ports:
      - "5432:5432"
    volumes:
      - authskip-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authskip -d authskip"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  authskip-postgres-data:
